name: Build today ICS

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests icalendar python-dateutil

      - name: Run ICS filter script
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
        run: python filter_ics.py

      - name: Commit only if ICS changed
        run: |
          git add today.ics

          if git diff --cached --quiet; then
            echo "No changes to ICS file"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "Update today ICS"
          git push