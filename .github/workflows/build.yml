name: Build today ICS

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests icalendar

      - name: Run script
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
        run: python filter_ics.py

      - name: Commit only if ICS changed

        run: |

          if git diff --quiet; then

            echo "No changes to ICS file"

            exit 0

          fi

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add today.ics

          git commit -m "Update today ICS"

          git push